name: Update Star History

on:
  schedule:
    - cron: "0 */6 * * *"
  watch:
    types: [started]
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/star-history.yml"

permissions:
  contents: write

concurrency:
  group: star-history
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: narayann7/star-history-action@29310fc87122228fe128d811f14027be3ca99601
        with:
          token: ${{ secrets.STAR_HISTORY_TOKEN }}
          repos: ${{ github.repository }}
          output-dir: assets/star-history
          type: Date
          themes: light,dark
          width: 800
          update-readme: "false"
          commit-message: "chore: update star history [skip ci]"
