name: Update Star History

on:
  schedule:
    - cron: "0 */6 * * *"
  watch:
    types: [started]
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/star-history.yml"
      - ".github/scripts/generate-star-history.mjs"

permissions:
  contents: write

concurrency:
  group: star-history
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Generate charts
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node .github/scripts/generate-star-history.mjs

      - name: Commit updated charts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/star-history

          if git diff --cached --quiet; then
            echo "Star history is already up to date."
            exit 0
          fi

          git commit -m "chore: update star history [skip ci]"
          git pull --rebase origin "$GITHUB_REF_NAME"
          git push origin "HEAD:$GITHUB_REF_NAME"
